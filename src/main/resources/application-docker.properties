# ============================================================
# Perfil DOCKER — sobreescribe application.properties
# Se activa con: SPRING_PROFILES_ACTIVE=docker  (en docker-compose)
# ============================================================

# ── URLs inter-microservicios ────────────────────────────────
# En local apuntan a localhost; en Docker usan los nombres de servicio del compose.
notifications.url=http://ms-notifications:5000
clasificator.url=http://ms-clasificator:8081/api/public/internal

# ── URL pública del MS (usada para generar URLs de fotos) ───
# Nginx expone el ms-security bajo /api/security, por eso la ruta base cambia.
app.base.url=http://localhost/api/security

# ── CORS ────────────────────────────────────────────────────
# En local el front corre en localhost:4200.
# En Docker Nginx sirve el front directamente en http://localhost (puerto 80).
app.cors.allowed-origins=http://localhost
